# ===== 远程节点订阅模块 =====
[server_remote]
# ⚠️ 重要：必须替换为实际的机场订阅链接才能使用！
#
# 配置格式：订阅链接, tag=机场名称, update-interval=更新间隔(秒), opt-parser=true, enabled=true
#
# 参数说明：
# - tag: 机场显示名称，可自定义
# - update-interval: 订阅更新间隔，86400=24小时，建议不要设置太短
# - opt-parser: 使用资源解析器转换节点，建议开启
# - enabled: 是否启用该订阅，true=启用，false=禁用
#
# 示例（使用时取消注释并替换为实际链接）：
# https://example.com/api/v1/client/subscribe?token=xxxxxxxx, tag=主机场, update-interval=86400, opt-parser=true, enabled=true

# 主要机场订阅（⚠️ 取消下方注释并替换为实际链接）
# https://你的机场订阅链接, tag=主机场, update-interval=86400, opt-parser=true, enabled=true

# 备用机场订阅（可选，可添加多个）
# https://备用订阅链接1, tag=备用机场1, update-interval=86400, opt-parser=true, enabled=false
# https://备用订阅链接2, tag=备用机场2, update-interval=86400, opt-parser=true, enabled=false

# ===== DNS解析模块 =====
[dns]
# 禁用系统DNS（推荐）
no-system

# 禁用IPv6（如果网络支持IPv6可以注释此行）
no-ipv6

# 国内DNS服务器（备用，DoH优先）
server = 223.5.5.5
server = 119.29.29.29

# DoH 加密DNS服务器（国内外混合，并发查询取最快响应）
# 包含：阿里云、腾讯云、Cloudflare、Google DNS
# 注意：境内 CDN 域名可能通过境外 DoH 解析到非最优 IP，已在下方按域名指定 DNS 优先覆盖
doh-server = https://223.5.5.5/dns-query, https://1.12.12.12/dns-query, https://1.1.1.1/dns-query, https://dns.google/dns-query

# 国内主流服务指定DNS
server = /*.taobao.com/223.5.5.5
server = /*.tmall.com/223.5.5.5
server = /*.alipay.com/223.5.5.5
server = /*.alicdn.com/223.5.5.5
server = /*.aliyun.com/223.5.5.5
server = /*.jd.com/119.28.28.28
server = /*.qq.com/119.28.28.28
server = /*.tencent.com/119.28.28.28
server = /*.weixin.com/119.28.28.28
server = /*.bilibili.com/119.29.29.29
server = /*.hdslb.com/119.29.29.29

# 海外服务指定DNS
server = /*.google.com/8.8.8.8
server = /*.youtube.com/8.8.8.8
server = /*.facebook.com/1.1.1.1
server = /*.twitter.com/1.1.1.1
server = /*.instagram.com/1.1.1.1
server = /*.telegram.org/1.1.1.1
server = /*.apple.com/system
server = /*.icloud.com/system

