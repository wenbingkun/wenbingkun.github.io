#==========================================
# 🎯 配置使用指南
#==========================================
#
# 1. 替换订阅链接：
#    在 [server_remote] 部分，将 "https://你的机场订阅链接" 
#    替换为你的实际机场订阅地址
#
# 2. 启用MitM解密：
#    - 在 QuantumultX 的"设置" > "MitM" 中生成证书
#    - 安装并信任证书
#    - 根据需要在 [mitm] 部分取消注释相应的 hostname
#
# 3. 调整策略组：
#    - 在 [policy] 部分可以调整节点筛选规则
#    - 通过 server-tag-regex 修改正则表达式来筛选节点
#
# 4. 自定义规则：
#    - 在 [filter_local] 部分添加自定义分流规则
#    - 在 [rewrite_local] 部分添加自定义重写规则
#
# 5. 功能开关：
#    - 在 [rewrite_remote] 中通过 enabled=true/false 控制重写
#    - 在 [filter_remote] 中通过 enabled=true/false 控制分流规则
#
# 6. 节点筛选说明（地区组 regex 摘要）：
#    亚洲独立节点：
#    - 🇭🇰 香港：(?i)港|hk|hongkong|hong kong
#    - 🇲🇴 澳门：(?i)澳门|macao|macau
#    - 🇨🇳 台湾：(?i)台|tw|taiwan
#    - 🇯🇵 日本：(?i)日本|jp|japan
#    - 🇰🇷 韩国：(?i)韩|kr|korea
#    - 🇸🇬 新加坡：(?i)新加坡|狮城|sg|singapore
#    - 🌏 东南亚：马来|泰国|越南|菲律宾|印尼|印度|不丹|斯里兰卡等
#    - 🌏 中亚：蒙古|哈萨克|乌兹别克|吉尔吉斯|塔吉克|土库曼
#    欧洲：
#    - 🇬🇧 英国：(?i)英|uk|britain|united kingdom
#    - 🇪🇺 欧洲（含法德及高加索）：法国|德国|荷兰|意大利|俄罗斯|格鲁吉亚|亚美尼亚|阿塞拜疆等
#    美洲：
#    - 🇺🇸 美国：(?i)美国|us|unitedstates|united states
#    - 🇨🇦 加拿大：(?i)加拿大|ca|canada
#    - 🌎 南美（含加勒比/中美洲/法属领地）：巴西|阿根廷|墨西哥|波多黎各|法属圭亚那等
#    大洋洲：
#    - 🇦🇺 澳洲：(?i)澳大利亚|澳洲|au|australia
#    - 🇳🇿 新西兰：(?i)新西兰|new zealand
#    - 🏝️ 大洋洲：斐济|巴布亚新几内亚|萨摩亚|关岛|美属萨摩亚等
#    其他：
#    - 🕌 中东：阿联酋|沙特|土耳其|以色列|伊拉克|约旦等
#    - 🌍 非洲：南非|埃及|肯尼亚|尼日利亚|留尼汪等
#    - 🇦🇶 南极：(?i)南极|antarctica
#
# 7. 常见问题：
#    - 规则不生效：检查规则顺序，本地规则优先于远程规则
#    - 无法联网：检查订阅是否有效，节点是否可用
#    - MitM不工作：确认已安装并信任证书
#    - 广告拦截失效：检查相关 hostname 是否已启用
#
# 8. 性能优化建议：
#    - 定期更新订阅和规则（建议24小时）
#    - 禁用不需要的重写和规则以提升性能
#    - 使用url-test策略组自动选择最优节点
#    - 合理配置check-interval避免频繁检测
#
# 9. 安全提醒：
#    - 不要随意信任未知来源的证书
#    - 谨慎使用 skip_validating_cert = true
#    - 定期检查并更新配置文件
#    - 使用正规机场服务
#
# 10. 高级功能：
#     - 可以添加多个机场订阅实现负载均衡
#     - 通过task_local设置定时任务
#     - 使用BoxJS进行高级配置管理
#     - 结合Surge等工具实现更复杂的网络控制
#
