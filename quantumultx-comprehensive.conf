# ===== HTTP后端模块 =====
[http_backend]
# BoxJS后端（需要启用BoxJS重写规则）
# https://raw.githubusercontent.com/chavyleung/scripts/master/box/chavy.boxjs.js, tag=BoxJS, path=^\/boxjs, enabled=false

# ===== HTTPS解密模块 =====
[mitm]
# 跳过证书验证（不建议开启，存在安全风险）
skip_validating_cert = false

# 跳过主机名验证（不建议开启，存在安全风险）
force_sni_domain_name = false

# 主机名配置说明：
# - 前缀 "-" 表示排除该域名（不解密）
# - 无前缀表示包含该域名（需解密）
# - 使用 MitM 前必须在 QuantumultX 中生成并信任证书

# 基本配置（排除Apple系统服务和部分风险域名）
hostname = -*.apple.com, -consumer.fcbox.com, -*huami.com, -*amemv.com, -*snssdk.com, -www.google.com

# ===== 快速启用配置 =====
# 如需启用广告拦截和功能增强，取消下方对应行的注释

# 方案一：全功能启用（推荐，包含主流应用去广告）
