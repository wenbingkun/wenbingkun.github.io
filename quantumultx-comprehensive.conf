# 📝 使用说明：
# 1. 订阅链接：在 [server_remote] 部分，将 "https://你的机场订阅链接" 替换为实际订阅。
# 2. 节点筛选：在 [policy] 部分调整 server-tag-regex 筛选条件。
# 3. 功能开关：在 [rewrite_remote] 和 [filter_remote] 部分，通过 enabled=true/false 控制。
