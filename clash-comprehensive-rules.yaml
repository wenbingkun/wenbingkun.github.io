#==========================================
# @ConfigName        全球精品机场融合配置 (优化版)
# @Author            基于墨鱼配置 + 全球机场订阅优化
# @UpdateTime        2026年3月
# @Function          全球节点覆盖、智能分流、游戏优化、AI服务支持、加密货币专线
# @ConfigVersion     3.5.2
# @Features          🌍全球196国节点 | 🎮游戏专线 | 🤖16个AI平台 | 💰加密货币 | 📋智能分流 | 📥下载优化
# @Changelog         v3.5.2: Antigravity→🤖AI(调研确认AI-first定位)；补充Windsurf/Codeium规则
#                    v3.5.1: 修复 Antigravity 规则覆盖(KEYWORD替换SUFFIX，移至AI规则前，覆盖.goog TLD)
#                    v3.5.0: 新增 Google Antigravity IDE 规则(antigravity.google + cloudcode-pa API)
#                    v3.4.0: 新增中亚节点组、补全欧/非/洋/美区域filter、修复DNS(respect-rules/sniffer)
#                    v3.3.0: 新增加密货币策略组(100+域名)、默认韩国节点
#                    v3.2.0: AI规则升级(5→14平台)、新增下载优化、新增Bahamut
#==========================================

# 基础配置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# 实验性功能
experimental:
  ignore-resolve-fail: true

# 全局配置
global-client-fingerprint: chrome

# 流量嗅探（Mihomo v1.18+ 新写法，替代已弃用的 sniff-tls-sni）
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]

# DNS 配置优化（增强容错性与隐私性）
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - time.*.com
    - time.*.gov
    - time.*.edu.cn
    - time.*.apple.com
    - time1.*.com
    - time2.*.com
    - time3.*.com
    - time4.*.com
    - time5.*.com
    - time6.*.com
    - time7.*.com
    - ntp.*.com
    - ntp1.*.com
    - ntp2.*.com
    - ntp3.*.com
    - ntp4.*.com
    - ntp5.*.com
    - ntp6.*.com
    - ntp7.*.com
    - "*.time.edu.cn"
    - "*.ntp.org.cn"
    - +.pool.ntp.org
    - localhost.ptlogin2.qq.com
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.xboxlive.com
    - msftconnecttest.com
    - xbox.*.microsoft.com
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
  nameserver:
    - https://223.5.5.5/dns-query
    - https://119.29.29.29/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/32
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
      - +.twitter.com
      - +.github.com
  respect-rules: true

# 建立锚点（增强容错性）
pr:   &a3 {type: select,   proxies: [♻️ 自动选择, 🚀 手动切换, 🇭🇰 香港节点, 🇲🇴 澳门节点, 🇯🇵 日本节点, 🇺🇲 美国节点, 🇨🇳 台湾节点, 🇸🇬 狮城节点, 🇰🇷 韩国节点, 🇬🇧 英国节点, 🇪🇺 欧洲节点, 🇨🇦 加拿大节点, 🇦🇺 澳洲节点, 🇳🇿 新西兰节点, 🏝️ 大洋洲节点, 🌎 南美节点, 🕌 中东节点, 🌍 非洲节点, 🇦🇶 南极节点, 🌏 东南亚节点, 🌏 中亚节点, 🌐 故障转移, DIRECT] }
p:    &a1 {type: http,     interval: 86400,  health-check: {enable: true, url: http://www.gstatic.com/generate_204, interval: 1800, timeout: 5000, lazy: true} }
auto: &a4 {type: url-test, lazy: true,  url: http://www.gstatic.com/generate_204, interval: 1800, tolerance: 50, timeout: 5000, use: [Sub] }
use:  &a2 {type: select,   use: [Sub] }
fallback: &a8 {type: fallback, lazy: true, url: http://www.gstatic.com/generate_204, interval: 1800, timeout: 5000, use: [Sub] }
c:    &a6 {type: http,     behavior: classical, interval: 86400}
d:    &a5 {type: http,     behavior: domain,    interval: 86400}
i:    &a7 {type: http,     behavior: ipcidr,    interval: 86400}

# 代理提供者（增强容错机制）
proxy-providers:
  Sub:
    <<: *a1
    url: https://example.com/subscription.yaml  # 请替换为实际的机场订阅链接
    path: ./proxy_providers/sub.yaml
    override:
      additional-prefix: "[机场]"
      additional-suffix: ""
    exclude-filter: "(?i)剩余|到期|过期|官网|产品|平台|网站|备用|频道|群|测试|实验"
    include-all: true

# 代理组配置
proxy-groups:
