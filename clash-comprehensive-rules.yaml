#==========================================
# 📝 配置文件说明
#==========================================
#
# 此版本基于原版进行了以下优化：
# 1. DNS优化: 优先使用加密DNS (DoH/DoT)，将常规DNS作为备用，增强隐私和安全性。
# 2. 规则精简: 移除了大量与规则集(RULE-SET)重复的域名(DOMAIN-SUFFIX)规则。
#    这使得配置文件更简洁、高效，并依赖于社区维护的最新规则列表。
# 3. 加密货币专线: 新增💰加密货币策略组，覆盖CEX/DEX/DeFi/行情/钱包/L2/跨链桥/资讯。
#
#==========================================
# 🎯 配置说明与使用指南
#==========================================
# 
# 📝 基础设置：
# 1. 替换订阅：将 "https://example.com/subscription.yaml" 替换为你的实际订阅链接
# 2. 开启TUN：如需TUN模式，将 "enable: false" 改为 "enable: true"
# 
# 🌟 核心功能特色：
# - 🎮 游戏平台：自动筛选机场中的游戏专用节点，延迟更低，包含全球游戏热门地区
# - 📋 智能分流：专用规则优先，避免通用规则误捕获
# - 🤖 AI服务：支持主流AI平台独立路由选择
# - 💰 加密货币：CEX/DEX/DeFi/行情/钱包/L2全覆盖，默认韩国节点
# - 🌍 全球覆盖：7大洲全区域节点支持
#
# 🌍 全球节点覆盖：
# 亚洲：香港、澳门、台湾、日本、韩国、新加坡、🌏 东南亚节点（马来、泰国、越南、菲律宾、印尼、印度等）、🌏 中亚节点（蒙古、哈萨克、乌兹别克、吉尔吉斯、塔吉克、土库曼）
# 欧洲：英国、🇪🇺 欧洲节点（法国、德国、荷兰、意大利、西班牙、瑞士、俄罗斯及英属属地等）
# 北美：美国、加拿大
# 南美：🌎 南美节点（巴西、阿根廷、智利、墨西哥及加勒比海地区）
# 大洋洲：澳大利亚、新西兰、🏝️ 大洋洲节点（斐济、巴布亚新几内亚、诺福克岛等）
# 非洲：🌍 非洲节点（南非、埃及、肯尼亚、南苏丹、冈比亚等）
# 中东：🕌 中东节点（阿联酋、沙特、土耳其等）
# 
# 🎮 游戏优化：
# - 游戏平台会优先使用游戏专线节点
# - 支持Steam、Epic、PlayStation、Xbox等平台
#
# 💰 加密货币专线（v3.3.0新增）：
# - 默认韩国节点，可切换至日本、新加坡、美国等
# - CEX：Binance, OKX, Bybit, Coinbase, Kraken, Gate.io, KuCoin等
# - DEX/DeFi：Uniswap, dYdX, Aave, Curve, GMX, Lido, Pendle等
# - 行情数据：CoinMarketCap, CoinGecko, TradingView, DefiLlama, Dune等
# - 钱包/浏览器：MetaMask, Phantom, Ledger, Etherscan, Solscan等
# - L2/跨链桥：Arbitrum, Optimism, Base, zkSync, StarkNet, LayerZero等
#
# 📋 规则匹配优先级（重要）：
# 🎯 专用平台规则（高优先级）：
#   - YouTube → 谷歌服务，TikTok → 社交平台
#   - Netflix、Disney+、Spotify、Twitch → 流媒体
#   - Binance、OKX、Uniswap等 → 加密货币
# 🌐 通用兜底规则（低优先级）：
#   - SocialMedia → 社交平台（捕获未知社交平台）
#   - GlobalMedia → 流媒体（捕获未知流媒体平台）
# ⚠️  专用规则必须在通用规则之前，否则会被误捕获
#==========================================
# 🛡️ 容错机制和故障处理说明
#==========================================
# 
# 🔧 DNS容错机制：
# - 多重DNS服务器：国内(223.5.5.5, 119.29.29.29) + 国外(1.1.1.1, 8.8.8.8)
# - DNS-over-HTTPS 双栈保障（主解析 + fallback 均使用 DoH）
# - respect-rules 确保代理域名的 DNS 查询遵循分流规则，防止 DNS 泄漏
# 
# 🌐 节点容错机制：
# - Fallback模式：主节点故障时自动切换到备用节点
# - 故障转移组：🌐 故障转移，所有节点统一管理
# - 备用线路组：🔄 备用线路，多重保障
# - 健康检查：每30分钟检测，超时5秒自动切换
# 
# 🎯 订阅容错机制：
# - 自动过滤：排除无效、过期、测试节点
# - 健康检查：定期检测节点可用性
# - 订阅缓存：本地保存，订阅服务器故障时仍可使用
# - 超时保护：连接超时5秒自动重试
# 
# 📋 规则容错机制：
# - 多重规则源：Loyalsoldier + blackmatrix7 + AdGuard等
# - 手动补充：重要域名手动添加，避免规则遗漏
# - 规则缓存：本地保存86400秒，减少依赖
# - 兜底规则：MATCH规则确保所有流量都有去向
# 
# 🚨 故障场景处理：
# 
# 1️⃣ 订阅服务器故障：
#    - 使用本地缓存的节点配置
#    - 手动导入备用订阅链接
#    - 切换到"🔄 备用线路"组
# 
# 2️⃣ 主要节点故障：
#    - Fallback自动切换到同地区其他节点
#    - 使用"🌐 故障转移"统一管理
#    - 临时切换到"🔄 备用线路"分散压力
