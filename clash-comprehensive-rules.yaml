#    - 手动切换到其他地区节点
#    - 使用DIRECT直连（适用于部分服务）
# 
# 4️⃣ DNS解析故障：
#    - 自动切换到备用DNS服务器
#    - Fallback机制使用国外DNS
#    - 手动切换enhanced-mode为redir-host
# 
# 5️⃣ 规则更新失败：
#    - 使用本地缓存的规则文件
#    - 手动域名规则确保核心服务可用
#    - 兜底规则确保所有流量正常转发
# 
# 6️⃣ 特定服务无法访问：
#    - 每个服务都有多个节点选择
#    - 备用线路选项作为最后保障
#    - 可临时调整为DIRECT直连测试
